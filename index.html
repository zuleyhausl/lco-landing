<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Legendary Club Owner — the football management game where the best manager wins real cash." />
  <title>Legendary Club Owner — Run the club. Win real money.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- NAV -->
  <header class="nav">
    <div class="nav__inner">
      <a href="#" class="nav__logo">LEGENDARY<span class="nav__logo-accent">CLUB OWNER</span></a>
      <span class="nav__badge">COMING SOON</span>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero__inner">
      <div class="hero__content">
        <p class="hero__eyebrow">A No Surrender Studio game</p>
        <h1 class="hero__title">
          Run the club.<br />
          <span class="hero__title-accent">Win real money.</span>
        </h1>
        <p class="hero__subtitle">
          No luck. No pay-to-win. Just the best manager.
        </p>
        <form class="hero__form" id="notifyForm">
          <input type="email" class="hero__input" placeholder="your@email.com" required aria-label="Email address" />
          <button type="submit" class="hero__cta">Notify Me at Launch</button>
        </form>
        <p class="hero__formNote">No spam. We'll only ping you when LCO goes live in your region.</p>
        <ul class="hero__trust">
          <li>⚽ Skill-based</li>
          <li>🏆 Real cash rewards</li>
          <li>📊 Real match data</li>
          <li>🚫 No pay-to-win</li>
        </ul>
      </div>
      <div class="hero__visual">
        <img src="assets/hero.jpg" alt="Stadium at night, viewed from the executive box" class="hero__image" />
        <div class="hero__visualGlow" aria-hidden="true"></div>
      </div>
    </div>
  </section>

  <!-- PLACEHOLDER: HOW IT WORKS -->

  <script src="script.js"></script>
</body>
</html>
